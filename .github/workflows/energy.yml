name: Energy Cron

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Run SMP
        run: |
          curl -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0 Safari/537.36" \
            -H "Accept: application/json,text/html,*/*" \
            -H "Referer: https://hn03.mycafe24.com/" \
            -c cookies.txt -b cookies.txt \
            "https://hn03.mycafe24.com/api/smp_cron.php?token=golde"

      - name: Wait
        run: sleep 10

      - name: Run REC
        run: |
          curl -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0 Safari/537.36" \
            -H "Accept: application/json,text/html,*/*" \
            -H "Referer: https://hn03.mycafe24.com/" \
            -c cookies.txt -b cookies.txt \
            "https://hn03.mycafe24.com/api/rec_cron.php?token=golde"
