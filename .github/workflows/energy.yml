name: Energy Cron

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Run SMP
        run: |
          curl -L "https://hn03.mycafe24.com/api/smp_cron.php?token=golde"

      - name: Wait
        run: sleep 10

      - name: Run REC
        run: |
          curl -L "https://hn03.mycafe24.com/api/rec_cron.php?token=golde"
